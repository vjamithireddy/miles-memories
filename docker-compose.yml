services:
  db:
    image: postgres:16
    container_name: milesmemories-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: milesmemories
      POSTGRES_USER: miles
      POSTGRES_PASSWORD: milespass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
